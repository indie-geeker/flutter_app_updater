name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install package dependencies
        run: flutter pub get
      - name: Install example dependencies
        working-directory: example
        run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze package
        run: flutter analyze --no-pub
      - name: Test package with coverage
        run: flutter test --coverage --no-pub
      - name: Enforce 80% coverage floor
        shell: bash
        run: |
          awk '
            /^SF:/ { file = substr($0, 4); lf = 0; lh = 0 }
            /^LF:/ { lf = substr($0, 4) + 0; total_lf += lf }
            /^LH:/ { lh = substr($0, 4) + 0; total_lh += lh }
            /^end_of_record/ {
              if (file ~ /(manifest_fetcher|manifest_schema|package_downloader)\.dart$/ &&
                  lf > 0 && (100 * lh / lf) < 80) {
                printf "%s coverage %.2f%% is below 80%%\n", file, 100 * lh / lf
                failed = 1
              }
            }
            END {
              total = total_lf == 0 ? 0 : 100 * total_lh / total_lf
              printf "Total line coverage: %.2f%%\n", total
              if (total < 80 || failed) exit 1
            }
          ' coverage/lcov.info
      - name: Generate API docs dry-run
        run: dart doc --dry-run
      - name: Analyze example
        working-directory: example
        run: flutter analyze --no-pub
      - name: Test example
        working-directory: example
        run: flutter test --no-pub
      - name: Validate pub archive
        run: flutter pub publish --dry-run

  android-example:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: example
        run: flutter pub get
      - name: Test and lint Android plugin
        working-directory: example/android
        run: ../../android/gradlew :flutter_app_updater:testDebugUnitTest :flutter_app_updater:lintDebug :app:processDebugMainManifest
      - name: Build Android example
        working-directory: example
        run: flutter build apk --debug --no-pub

  macos-example:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
      - name: Install dependencies
        working-directory: example
        run: flutter pub get
      - name: Build macOS example
        working-directory: example
        run: flutter build macos --debug --no-pub

  ios-example:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: example
        run: flutter pub get
      - name: Build iOS example for simulator
        working-directory: example
        run: flutter build ios --simulator --debug --no-codesign --no-pub

  windows-example:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Install dependencies
        working-directory: example
        run: flutter pub get
      - name: Build Windows example
        working-directory: example
        run: flutter build windows --debug --no-pub
