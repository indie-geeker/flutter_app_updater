name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  full-gate:
    uses: ./.github/workflows/full-gate.yml

  release-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Verify tag package and changelog metadata
        run: dart run tool/ci/verify_release_metadata.dart --tag "$GITHUB_REF_NAME"
      - name: Require the tagged commit to belong to main
        shell: bash
        run: |
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git fetch origin main
          git merge-base --is-ancestor "$tag_commit" origin/main

  publish:
    needs: [full-gate, release-metadata]
    permissions:
      contents: read
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
    with:
      environment: pub.dev
