name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Verify tag matches pubspec version
        shell: bash
        run: |
          package_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          if [[ "v${package_version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pubspec ${package_version}."
            exit 1
          fi
      - name: Install dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze --no-pub
      - name: Test
        run: flutter test --no-pub
      - name: Generate API docs dry-run
        run: dart doc --dry-run
      - name: Validate package archive
        run: flutter pub publish --dry-run

  publish:
    needs: validate
    permissions:
      contents: read
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: pub.dev
