version: 2
updates:
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
  - package-ecosystem: pub
    directory: /example
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
  - package-ecosystem: gradle
    directory: /example/android
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
